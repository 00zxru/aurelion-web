<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELION</title>
    <meta name="description" content="A selective creative entity that observes and recognizes creatives based on precision, discipline, and execution.">
    <meta name="keywords" content="creative, archive, recognition, precision, discipline, execution">
    <meta name="author" content="AURELION">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AURELION">
    <meta property="og:description" content="A selective creative entity that observes and recognizes creatives based on precision, discipline, and execution.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-image.jpg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('SW registered: ', registration);
                    })
                    .catch((registrationError) => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
    <!-- Star Field -->
    <div class="star-field" id="starField"></div>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- App Container -->
    <div class="app-container" id="appContainer">
        
        <!-- Entry Screen -->
        <div class="view entry-screen" id="entryScreen">
            <div class="entry-content">
                <h1 class="wordmark">AURELION</h1>
                <p class="entry-subtitle">Observed.</p>
            </div>
        </div>

        <!-- Access Portal -->
        <div class="view access-portal" id="accessPortal">
            <div class="access-form">
                <h2 class="access-title">Access</h2>
                <input type="text" class="form-input" id="accessCode" placeholder="Enter recognition code" style="text-transform: uppercase;">
                <button class="form-button" id="accessButton" onclick="validateAccess()">Proceed</button>
                <div class="error-message" id="errorMessage">Recognition not confirmed.</div>
            </div>
        </div>

        <!-- Main App -->
        <div class="view main-app" id="mainApp">
            
            <!-- Desktop Navigation -->
            <nav class="desktop-nav" id="desktopNav">
                <div class="nav-header">
                    <div class="logo">AURELION</div>
                    <div class="nav-status">Observed</div>
                </div>
                <div class="nav-menu">
                    <button class="nav-item" data-view="home" onclick="navigateTo('home')">
                        <span class="nav-icon">§</span>
                        <span class="nav-label">Observation</span>
                    </button>
                    <button class="nav-item" data-view="houses" onclick="navigateTo('houses')">
                        <span class="nav-icon">«</span>
                        <span class="nav-label">Entities</span>
                    </button>
                    <button class="nav-item" data-view="profile" onclick="navigateTo('profile')">
                        <span class="nav-icon">°</span>
                        <span class="nav-label">Record</span>
                    </button>
                    <button class="nav-item" data-view="admin" onclick="navigateTo('admin')">
                        <span class="nav-icon">»</span>
                        <span class="nav-label">Archive</span>
                    </button>
                </div>
                <div class="nav-footer">
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-button" onclick="toggleSettings()">
                            <span>Operations</span>
                            <span class="dropdown-arrow">v</span>
                        </button>
                        <div class="settings-menu" id="settingsMenu">
                            <a href="#" class="settings-item" onclick="navigateTo('profile')">Record</a>
                            <a href="#" class="settings-item" onclick="navigateTo('admin')">Archive</a>
                            <a href="#" class="settings-item" onclick="logout()">Depart</a>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Mobile Navigation -->
            <nav class="mobile-nav" id="mobileNav">
                <button class="mobile-nav-item" data-view="home" onclick="navigateTo('home')">
                    <span class="mobile-nav-icon">§</span>
                    <span class="mobile-nav-label">Observe</span>
                </button>
                <button class="mobile-nav-item" data-view="houses" onclick="navigateTo('houses')">
                    <span class="mobile-nav-icon">«</span>
                    <span class="mobile-nav-label">Entities</span>
                </button>
                <button class="mobile-nav-item" data-view="profile" onclick="navigateTo('profile')">
                    <span class="mobile-nav-icon">°</span>
                    <span class="mobile-nav-label">Record</span>
                </button>
                <button class="mobile-nav-item" data-view="admin" onclick="navigateTo('admin')">
                    <span class="mobile-nav-icon">»</span>
                    <span class="mobile-nav-label">Archive</span>
                </button>
            </nav>

            <!-- Content Area -->
            <main class="main-content" id="mainContent">
                
                <!-- Home View -->
                <div class="content-view" id="homeView">
                    <section class="hero">
                        <div class="hero-content">
                            <div class="hero-wordmark logo">
                                AURELION
                                <div class="solar-crest"></div>
                            </div>
                            <p class="hero-tagline">AURELION observes.</p>
                            <p class="hero-subtitle">Precision. Discipline. Execution.</p>
                        </div>
                    </section>
                </div>

                <!-- Houses View -->
                <div class="content-view" id="housesView">
                    <div class="view-header">
                        <h2 class="view-title">Entities</h2>
                        <p class="view-subtitle">Five observed collectives</p>
                    </div>
                    <div class="houses-grid" id="housesGrid">
                        <!-- Houses will be loaded dynamically -->
                    </div>
                </div>

                <!-- House Detail View -->
                <div class="content-view" id="houseDetailView">
                    <div class="house-detail" id="houseDetail">
                        <!-- House details will be loaded dynamically -->
                    </div>
                </div>

                <!-- Profile View -->
                <div class="content-view" id="profileView">
                    <div class="profile-container" id="profileContainer">
                        <!-- Profile content will be loaded dynamically -->
                    </div>
                </div>

                <!-- Admin View -->
                <div class="content-view" id="adminView">
                    <div class="admin-container" id="adminContainer">
                        <!-- Admin content will be loaded dynamically -->
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Modal content will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Profile Completion Banner -->
    <div class="profile-banner" id="profileBanner">
        <div class="banner-content">
            <span>Record incomplete. Recognition pending.</span>
            <button class="banner-button" onclick="navigateTo('profile')">Complete Record</button>
        </div>
        <button class="banner-close" onclick="closeProfileBanner()">×</button>
    </div>

    <script src="components/AurelionWordmark.js"></script>
    <script src="components/SolarCrest.js"></script>
    <script src="components/IntroAnimation.js"></script>
    <script src="components/LandingMotion.js"></script>
    <script src="components/HouseSystem.js"></script>
    <script src="components/ProfileSystem.js"></script>
    <script src="components/RecognitionSystem.js"></script>
    <script src="components/ActivitySystem.js"></script>
    <script src="components/WorkSystem.js"></script>
    <script src="components/AdminSystem.js"></script>
    <script src="components/ContactSystem.js"></script>
    <script src="components/AccessibilitySystem.js"></script>
    <script src="components/BrandVoiceSystem.js"></script>
    <script src="components/StretchGoalsSystem.js"></script>
    <script src="app.js"></script>
</body>
</html>
